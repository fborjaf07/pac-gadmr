name: Sync Trámites PAC

on:
  schedule:
    - cron: '0 11 * * *'   # 06:00 Ecuador
    - cron: '0 15 * * *'   # 10:00 Ecuador
    - cron: '0 19 * * *'   # 14:00 Ecuador
    - cron: '0 23 * * *'   # 18:00 Ecuador
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAC_GADMR_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Ejecutar sync
        env:
          EDOC_USUARIO:    ${{ secrets.EDOC_USUARIO }}
          EDOC_CONTRASENA: ${{ secrets.EDOC_CONTRASENA }}
          PAC_GADMR_TOKEN: ${{ secrets.PAC_GADMR_TOKEN }}
        run: python scripts/4_sync_tramites_pac.py
