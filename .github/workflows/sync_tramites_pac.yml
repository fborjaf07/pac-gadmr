name: Sync Trámites PAC

on:
  schedule:
    - cron: '0 11 * * *'   # 06:00 Ecuador
    - cron: '0 15 * * *'   # 10:00 Ecuador
    - cron: '0 19 * * *'   # 14:00 Ecuador
    - cron: '0 23 * * *'   # 18:00 Ecuador
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAC_GADMR_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar sync
        env:
          EDOC_USUARIO:    ${{ secrets.EDOC_USUARIO }}
          EDOC_CONTRASENA: ${{ secrets.EDOC_CONTRASENA }}
        run: python scripts/4_sync_tramites_pac.py

      - name: Commit tramites_pac.json
        run: |
          git config user.name "PAC Monitor Bot"
          git config user.email "pac-bot@gadmr.gob.ec"
          git add tramites_pac.json
          git diff --staged --quiet || git commit -m "sync: tramites_pac $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
